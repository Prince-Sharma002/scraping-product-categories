name: Run OrderMonk Scraper

on:
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    timeout-minutes: 360     # 6 hours max (covers long batches)

    steps:
      # ── 1. Pull the latest code (including pending/ txt files)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Full history needed for git push

      # ── 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'       # Cache pip deps → faster runs

      # ── 3. Install dependencies (MUST happen before running main.py)
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── 4. Run the scraper
      - name: Run Scraper
        env:
          OXYLABS_USER: ${{ secrets.OXYLABS_USER }}
          OXYLABS_PASS: ${{ secrets.OXYLABS_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASS: ${{ secrets.ALERT_EMAIL_PASS }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
        run: python main.py

      # ── 5. Commit and push results (scraped/ moves + audit_log.json)
      - name: Commit and Push Results
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # Stage ALL changes inside input_keywords/ — this captures:
          #   ✅ new files added in scraped/ and failed/
          #   ✅ deleted files removed from pending/  ← this was the missing piece
          git add input_keywords/ audit_log.json || true

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit (no files were processed this run)."
          else
            git commit -m "🤖 Auto-scrape: $(date +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
